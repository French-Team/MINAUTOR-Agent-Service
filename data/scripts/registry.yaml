    script: "scripts/projects/create.js"
    description: "Crée un projet (variante : j'aimerais créer un projet)"

  - pattern: "(?:initialise|initialiser|init)\s+(?:un\s+)?(?:nouveau\s+)?(?:projet|proj)"
    subject: "project-request"
    script: "scripts/projects/create.js"
    description: "Crée un projet (variante : initialise un projet)"

  - pattern: "(?:cr[ée]e\s*(?:-?\s*)?moi|cr[ée]er\s+moi)\s+(?:un\s+)?(?:nouveau\s+)?(?:projet|proj)"
    subject: "project-request"
    script: "scripts/projects/create.js"
    description: "Crée un projet (variante : crée-moi un projet)"

  - pattern: "(?:je\s+)?(?:veux|voudrais|veut|souhaite)\s+cr[ée]er\s+(?:un\s+)?(?:nouveau\s+)?(?:projet|proj)"
