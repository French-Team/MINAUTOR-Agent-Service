    params:
      - name: project
        from: 1

  - pattern: "(?:nouveau\s+)?(?:projet|proj)\s+(?:appel[ée]|nomm[ée]|intitul[ée])\s+\"([^\"]+)\""
    subject: "project-request"
    script: "scripts/projects/create.js"
    description: "Crée un projet (variante : un nouveau projet appelé 'nom')"
    params:
      - name: project
        from: 1

  - pattern: "(?:cr[ée]e\s*(?:-?\s*)?moi|cr[ée]er\s+moi)\s+(?:un\s+)?(?:nouveau\s+)?(?:projet|proj)\s+\"([^\"]+)\""
    subject: "project-request"
    script: "scripts/projects/create.js"
    description: "Crée un projet (variante : crée-moi un projet 'nom')"
    params:
      - name: project
        from: 1

  # Sans nom (génériques)
  - pattern: "(?:j'aimerais|je\s+voudrais|je\s+veux|je\s+souhaite)\s+(?:cr[ée]er|faire|initialiser|lancer|commencer|d[ée]marrer)\s+(?:un\s+)?(?:nouveau\s+)?(?:projet|proj)"
