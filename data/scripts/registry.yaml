    script: "scripts/create/triage.js"
    description: "Demande de création (crée/développe X pour Y)"

  - pattern: "(?:j'ai\s+besoin\s+(?:que\s+tu\s+)?(?:d'un|d'une|de)\s+|j'aimerais\s+(?:que\s+tu\s+)?|je\s+voudrais\s+(?:que\s+tu\s+)?)(?:cr[ée]es|cr[ée]r|d[ée]veloppes|d[ée]velopper|impl[ée]mentes|impl[ée]menter|construises|fabriques|g[ée]n[èe]res|[ée]crives)\s+\S+"
    subject: "create-request"
    script: "scripts/create/triage.js"
    description: "Demande de création (j'ai besoin que tu crées/développes)"

  - pattern: "fais\s+(?:moi\s+)?(?:un[e]\s+)?(?:petit\s+)?(?:script|outil|utilitaire|programme|fonctionnalit[ée]|module|composant|service|API|page|écran)\s+(?:pour|qui|de)\s+\S+"
    subject: "create-request"
    script: "scripts/create/triage.js"
    description: "Demande de création (fais-moi un script/outil)"

  # ── Deploy (patterns spécifiques AVANT le catch-all) ──
  - pattern: "(?:configure|installe|d[ée]ploie|setup|d[ée]marre|lance)\s+(?:(?:le|la|les?|un|une|mon|ma|mes)\s+)?\S+"
    subject: "deploy-request"
    script: "scripts/deploy/triage.js"
    description: "Demande de déploiement (configure/installe/déploie)"

  - pattern: "(?:j'ai\s+besoin\s+(?:de\s+)?|j'aimerais\s+|je\s+voudrais\s+|peux-tu\s+|pourrais-tu\s+)(?:configurer|installer|d[ée]ployer|lancer|d[ée]marrer|mettre\s+en\s+place)\s+\S+"
    subject: "deploy-request"
    script: "scripts/deploy/triage.js"
    description: "Demande de déploiement (j'ai besoin de configurer/installer)"

  # ── Fallback génériques par sujet ──────────────────
  - pattern: ".*"
    subject: "analysis-request"
    script: "scripts/analysis/triage.js"
    description: "Analyse générique et triage de la demande"

  - pattern: ".*"
    subject: "review-request"
    script: "scripts/review/triage.js"
    description: "Triage d'une demande de revue de code"

  - pattern: ".*"
    subject: "create-request"
    script: "scripts/create/triage.js"
    description: "Triage d'une demande de création"

  - pattern: ".*"
    subject: "deploy-request"
    script: "scripts/deploy/triage.js"
    description: "Triage d'une demande de déploiement"

  - pattern: ".*"
    subject: "advice-request"
    script: "scripts/advice/triage.js"
    description: "Triage d'une demande de conseil"
