  # ── Nouvelles formulations naturelles (création projet) ──
  # Ordre : patterns avec params (nom du projet) AVANT les génériques sans params (first match wins)

  # Avec nom du projet (via params)
  - pattern: "(?:j'aimerais|je\s+voudrais|je\s+veux|je\s+souhaite)\s+(?:cr[ée]er|faire|initialiser|lancer|commencer|d[ée]marrer)\s+(?:un\s+)?(?:nouveau\s+)?(?:projet|proj)\s+appel[ée]\s+\"([^\"]+)\""
